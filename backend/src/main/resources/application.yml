spring:
  application:
    name: service-knowledge-manager

  datasource:
    # SQLite database file (stored in user home)
    url: jdbc:sqlite:${user.home}/.skm/skm.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
      show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
        # SQLite performance tuning
        jdbc:
          batch_size: 50

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8888

skm:
  agreed-directory-path: ${user.home}/skm-agreed-directory
  design-spaces-base-path: ${user.home}/skm-design-spaces

logging:
  level:
    com.skm: DEBUG
    org.springframework.web: INFO
